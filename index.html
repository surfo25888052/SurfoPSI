<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電商前台｜商品選購</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <style>
    .top-wrap{display:flex;flex-direction:column;gap:12px;margin:16px auto;max-width:1380px;padding:0 16px;}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#fff;padding:12px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);}
    .toolbar input,.toolbar select{padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;}
    .toolbar .grow{flex:1;min-width:220px;}
    #product-count,#last-update{color:#666;font-size:14px;}
    .grid .card .price{font-weight:700;color:#2E7D32;}
    .grid .card .meta{font-size:12px;color:#666;min-height:18px;}
    .grid .card .stock{font-size:13px;}
    .grid .card .stock.low{color:#B71C1C;font-weight:700;}
    .grid .card .qty-box{display:flex;flex-direction:column;gap:6px;align-items:stretch;margin:10px 0 12px;}
    .grid .card .qty-label{font-size:13px;color:#666;text-align:left;}
    .grid .card .qty-input{width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;}

    .shop-main{max-width:1380px;margin:0 auto;padding:0 16px 24px;display:block;}
    .shop-products-panel{min-width:0;}
    .shop-products-panel .grid{justify-content:flex-start;gap:20px 28px;}
    .shop-products-panel #pagination{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}

    .shop-menu-strip{background:#fff;border-radius:18px;box-shadow:0 3px 12px rgba(0,0,0,.08);padding:14px 16px;display:flex;flex-direction:column;gap:12px;align-items:center;}
    .shop-menu-strip__head{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;flex-direction:column;text-align:center;width:100%;}
    .shop-menu-strip__title{font-size:22px;font-weight:800;color:#2E7D32;line-height:1.2;text-align:center;}
    .shop-menu-strip__week{font-size:13px;color:#6b7280;line-height:1.5;margin-top:4px;text-align:center;}
    .shop-menu-strip__actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;}
    .shop-menu-rail__nav-btn{border:none;background:#eef6ef;color:#2E7D32;border-radius:10px;padding:8px 12px;font-weight:800;cursor:pointer;box-shadow:none;}
    .shop-menu-rail__nav-btn--today{min-width:68px;}
    .shop-menu-rail__status{font-size:14px;color:#6b7280;background:#f8faf8;border-radius:12px;padding:12px 14px;text-align:center;}
    .shop-menu-rail__list{display:flex;gap:12px;overflow-x:auto;padding:0 2px 6px;scrollbar-width:thin;justify-content:center;width:100%;margin:0 auto;}
    .shop-menu-rail__day{border:1px solid #dfe7df;background:#fff;border-radius:14px;padding:12px 12px;cursor:pointer;text-align:center;transition:all .2s;min-width:138px;flex:0 0 auto;}
    .shop-menu-rail__day:hover{border-color:#85b487;transform:translateY(-1px);box-shadow:0 8px 16px rgba(46,125,50,.08);}
    .shop-menu-rail__day.is-today{border-color:#2E7D32;box-shadow:0 0 0 2px rgba(46,125,50,.08);}
    .shop-menu-rail__day-top{font-size:18px;font-weight:800;color:#1f2937;line-height:1.2;}
    .shop-menu-rail__day-sub{font-size:13px;color:#2E7D32;font-weight:700;margin-top:4px;}
    .shop-menu-rail__day-meta{font-size:12px;color:#6b7280;margin-top:4px;}
    .shop-menu-rail__day-tag{display:inline-flex;align-items:center;justify-content:center;min-width:74px;margin-top:8px;padding:4px 10px;border-radius:999px;background:#eef6ef;color:#2E7D32;font-size:12px;font-weight:700;}
    .shop-menu-rail__day-tag.is-empty{background:#f4f4f4;color:#888;}
    .shop-menu-strip__hint{padding:10px 12px;border-radius:12px;background:#f8faf8;color:#6b7280;font-size:13px;line-height:1.7;text-align:center;max-width:980px;width:100%;margin:0 auto;}
    .menu-query-btn{background:#f3fff3;color:#2E7D32;border:1px solid #cfe6cf;}
    @media (max-width:1100px){ .shop-products-panel .grid{justify-content:center;} }
    @media (max-width:600px){ header{padding:12px 14px;} .toolbar{padding:10px;} .shop-menu-strip__title{font-size:20px;} .shop-menu-strip__head{align-items:center;} .shop-menu-strip__actions{width:100%;} .shop-menu-rail__list{justify-content:flex-start;} .shop-menu-rail__nav-btn{flex:1;} .shop-menu-rail__day{min-width:124px;} }

    .shop-menu-fab{position:fixed;left:18px;bottom:96px;z-index:80;display:inline-flex;align-items:center;gap:10px;padding:14px 16px;border:none;border-radius:999px;background:#2E7D32;color:#fff;font-size:15px;font-weight:800;box-shadow:0 12px 28px rgba(46,125,50,.28);cursor:pointer;transition:transform .2s, box-shadow .2s;}
    .shop-menu-fab:hover{transform:translateY(-1px);box-shadow:0 16px 32px rgba(46,125,50,.32);}
    .shop-menu-fab__icon{font-size:18px;line-height:1;}
    .shop-menu-fab__text{white-space:nowrap;}
    @media (max-width:900px){ .shop-menu-fab{left:14px;bottom:86px;padding:12px 14px;font-size:14px;} }
    @media (max-width:600px){ .shop-menu-fab{left:12px;right:auto;bottom:76px;padding:12px 13px;border-radius:16px;} .shop-menu-fab__text{display:none;} .shop-menu-fab__icon{font-size:20px;} }
  </style>
</head>
<body>
  <header>
    <div class="logo-group">
      <img class="logo" src="images/logo.png" alt="logo" onerror="this.style.display='none'">
      <h1 class="title">共同採購平台</h1>
    </div>
    <div>
      <a href="admin/login.html" title="前往後台">後台入口</a>
      <span id="memberArea"></span>
      <span class="cart-icon" onclick="window.location.href='cart.html'">
        🛒 <span id="cart-count" class="cart-badge"></span>
      </span>
    </div>
  </header>

  <button type="button" class="shop-menu-fab" onclick="openTodayMenuModal(event)" aria-label="開啟本日菜單">
    <span class="shop-menu-fab__icon">🍱</span>
    <span class="shop-menu-fab__text">本日菜單</span>
  </button>

  <div class="top-wrap">
    <div class="toolbar">
      <input id="searchInput" class="grow" type="text" placeholder="搜尋商品名稱..." oninput="searchProducts()">
      <select id="categorySelect" onchange="changeCategory(this.value)"><option value="全部商品">全部商品</option></select>
      <select id="sortSelect" onchange="changeSort(this.value)">
        <option value="">排序方式</option>
        <option value="id_asc">料號 ↑</option>
        <option value="id_desc">料號 ↓</option>
        <option value="price_asc">價格 ↑</option>
        <option value="price_desc">價格 ↓</option>
        <option value="name_asc">名稱 A→Z</option>
        <option value="name_desc">名稱 Z→A</option>
      </select>
      <button type="button" class="menu-query-btn" onclick="openWeeklyMenuModal(event)">菜單查詢</button>
      <button type="button" onclick="reloadProducts()">重新載入商品</button>
    </div>
    <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <div id="product-count">共 0 項商品</div>
      <div id="last-update"></div>
    </div>
  </div>

  <main class="shop-main">
    <section class="shop-products-panel">
      <div id="product-list" class="grid"></div>
      <div id="pagination"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 共同採購平台（前台）｜與後台共用同一個 Google Sheet 資料庫</p>
  </footer>

  <script src="config.js"></script>
  <script src="member.shop.js"></script>
  <script src="cart-utils.js"></script>
  <script src="shop.js"></script>
  <script src="weekly-menu.js"></script>
</body>
</html>
