<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入｜後台管理系統</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .login-actions{ margin-top:14px; text-align:center; }
    .back-shop-entry{ display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:8px; background:#1565C0; color:#fff; text-decoration:none; }
    .back-shop-entry:hover{ background:#0D47A1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>後台登入</h1>
    <form onsubmit="login(event)">
      <label for="loginUsername">帳號</label>
      <input type="text" id="loginUsername" placeholder="輸入帳號">

      <label for="loginPassword">密碼</label>
      <div class="password-field">
        <input type="password" id="loginPassword" placeholder="輸入密碼">
        <button type="button" class="password-toggle" data-target="loginPassword" aria-label="顯示密碼" aria-pressed="false" title="顯示密碼">👁️</button>
      </div>

      <button type="submit">登入</button>
    </form>
    <div class="login-actions"><a href="../index.html" class="back-shop-entry">🛒 回到電商頁面</a></div>
  </div>

  <script src="config.js"></script>
  <script src="member.admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      document.querySelectorAll('.password-toggle').forEach(function(btn){
        btn.addEventListener('click', function(){
          var targetId = btn.getAttribute('data-target');
          var input = document.getElementById(targetId);
          if (!input) return;
          var showing = input.type === 'text';
          input.type = showing ? 'password' : 'text';
          btn.setAttribute('aria-pressed', showing ? 'false' : 'true');
          btn.setAttribute('aria-label', showing ? '顯示密碼' : '隱藏密碼');
          btn.setAttribute('title', showing ? '顯示密碼' : '隱藏密碼');
          btn.textContent = showing ? '👁️' : '🙈';
        });
      });
    });
  </script>

</body>
</html>
