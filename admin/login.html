<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入｜後台管理系統</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .login-actions{ margin-top:14px; text-align:center; }
    .back-shop-entry{ display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:8px; background:#1565C0; color:#fff; text-decoration:none; }
    .back-shop-entry:hover{ background:#0D47A1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>後台登入</h1>
    <form onsubmit="login(event)">
      <label for="loginUsername">帳號</label>
      <input type="text" id="loginUsername" placeholder="輸入帳號">

      <label for="loginPassword">密碼</label>
      <input type="password" id="loginPassword" placeholder="輸入密碼">

      <button type="submit">登入</button>
    </form>
    <div class="login-actions"><a href="../index.html" class="back-shop-entry">🛒 回到電商頁面</a></div>
  </div>

  <script src="config.js"></script>
  <script src="member.admin.js"></script>
</body>
</html>
