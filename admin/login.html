<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入｜後台管理系統</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .login-actions{ margin-top:14px; text-align:center; }
    .back-shop-entry{ display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:8px; background:#1565C0; color:#fff; text-decoration:none; }
    .back-shop-entry:hover{ background:#0D47A1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>後台登入</h1>
    <form onsubmit="login(event)">
      <label for="loginUsername">帳號</label>
      <input type="text" id="loginUsername" placeholder="輸入帳號">

      <label for="loginPassword">密碼</label>
      <div class="password-field">
        <input type="password" id="loginPassword" placeholder="輸入密碼">
        <button type="button" class="password-toggle" data-target="loginPassword" aria-label="顯示密碼" aria-pressed="false" title="顯示密碼"></button>
      </div>

      <button type="submit">登入</button>
    </form>
    <div class="login-actions"><a href="../index.html" class="back-shop-entry">🛒 回到電商頁面</a></div>
  </div>

  <script src="config.js"></script>
  <script src="member.admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function(){
      var eyeOpenSvg = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
      var eyeClosedSvg = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path><path d="M9.5 5.3A11.8 11.8 0 0 1 12 5c6.4 0 10 7 10 7a17.3 17.3 0 0 1-4.1 4.8"></path><path d="M6.6 6.6A17.3 17.3 0 0 0 2 12s3.6 7 10 7a11.8 11.8 0 0 0 2.5-.3"></path></svg>';
      document.querySelectorAll('.password-toggle').forEach(function(btn){
        var targetId = btn.getAttribute('data-target');
        var input = document.getElementById(targetId);
        if (!input) return;
        function renderIcon(){
          var showing = input.type === 'text';
          btn.innerHTML = showing ? eyeClosedSvg : eyeOpenSvg;
          btn.setAttribute('aria-pressed', showing ? 'true' : 'false');
          btn.setAttribute('aria-label', showing ? '隱藏密碼' : '顯示密碼');
          btn.setAttribute('title', showing ? '隱藏密碼' : '顯示密碼');
        }
        btn.addEventListener('click', function(){
          input.type = input.type === 'text' ? 'password' : 'text';
          renderIcon();
        });
        renderIcon();
      });
    });
  </script>

</body>
</html>
